<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Smart Request Board — All Requests</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Smart Request Board</h1>
  <nav>
    <a href="index.html">Submit</a>
    <a href="requests.html" class="active">All Requests</a>
  </nav>
</header>

<main class="container">

  <div class="card">
    <h2>All Requests</h2>

    <!-- Filters -->
    <div class="filter-bar">
      <select id="filter-category" class="filter-select">
        <option value="">All categories</option>
      </select>
      <select id="filter-priority" class="filter-select">
        <option value="">All priorities</option>
        <option value="urgent">Urgent</option>
        <option value="normal">Normal</option>
        <option value="low">Low</option>
      </select>
      <button id="refresh-btn" class="btn-secondary">Refresh</button>
    </div>

    <div class="table-wrap">
      <table id="requests-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Item</th>
            <th>Category</th>
            <th>Budget (CHF)</th>
            <th>Priority</th>
            <th>Submitted</th>
          </tr>
        </thead>
        <tbody id="requests-body">
          <tr><td colspan="6" class="empty">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Match panel: shown when a row is clicked -->
  <div id="match-panel" class="card">
    <h2 id="match-title">Matched Products</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Product</th>
            <th>Category</th>
            <th>Price (CHF)</th>
          </tr>
        </thead>
        <tbody id="match-body"></tbody>
      </table>
    </div>
    <p class="hint">Products filtered to the request's category and budget.</p>
  </div>

</main>

<script>
  const API = "http://localhost:5000";

  let allRequests = [];

  function escapeHtml(str) {
    return String(str ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  async function loadRequests() {
    const tbody = document.getElementById("requests-body");
    try {
      const res = await fetch(`${API}/requests`);
      allRequests = await res.json();
      populateCategoryFilter();
      renderTable();
    } catch {
      tbody.innerHTML = `<tr><td colspan="6" class="empty">Could not load requests — is the backend running?<br><small>cd backend &amp;&amp; python3 app.py</small></td></tr>`;
    }
  }

  function populateCategoryFilter() {
    const select = document.getElementById("filter-category");
    const current = select.value;
    const categories = [...new Set(allRequests.map(r => r.category))].sort();
    // Keep the "All categories" option, replace the rest
    select.innerHTML = `<option value="">All categories</option>` +
      categories.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");
    if (current) select.value = current;
  }

  function renderTable() {
    const tbody = document.getElementById("requests-body");
    const catFilter  = document.getElementById("filter-category").value;
    const prioFilter = document.getElementById("filter-priority").value;

    const filtered = allRequests.filter(r =>
      (!catFilter  || r.category === catFilter) &&
      (!prioFilter || r.priority === prioFilter)
    );

    if (!filtered.length) {
      tbody.innerHTML = `<tr><td colspan="6" class="empty">No requests found.</td></tr>`;
      return;
    }

    tbody.innerHTML = filtered.map(r => `
      <tr class="clickable" data-id="${r.id}">
        <td>#${r.id}</td>
        <td><strong>${escapeHtml(r.item)}</strong><br><span class="raw-input">${escapeHtml(r.raw_input)}</span></td>
        <td>${escapeHtml(r.category)}</td>
        <td>${r.budget_chf != null ? r.budget_chf : "—"}</td>
        <td><span class="badge badge-${escapeHtml(r.priority)}">${escapeHtml(r.priority)}</span></td>
        <td class="date-cell">${formatDate(r.created_at)}</td>
      </tr>
    `).join("");

    // Row click → load matches
    tbody.querySelectorAll("tr.clickable").forEach(tr => {
      tr.addEventListener("click", () => loadMatches(Number(tr.dataset.id)));
    });
  }

  async function loadMatches(requestId) {
    const panel    = document.getElementById("match-panel");
    const title    = document.getElementById("match-title");
    const matchBody = document.getElementById("match-body");

    panel.style.display = "block";
    matchBody.innerHTML = "<tr><td colspan='3'>Loading…</td></tr>";

    // Scroll to panel
    panel.scrollIntoView({ behavior: "smooth", block: "start" });

    try {
      const res  = await fetch(`${API}/match?request_id=${requestId}`);
      const data = await res.json();

      const req = allRequests.find(r => r.id === requestId);
      title.textContent = `Matches for #${requestId}: ${req ? req.item : ""} (${data.category}${data.budget_chf != null ? `, ≤ CHF ${data.budget_chf}` : ""})`;

      if (!data.matches || !data.matches.length) {
        matchBody.innerHTML = `<tr><td colspan="3" class="empty">No catalog items match this request.</td></tr>`;
        return;
      }

      matchBody.innerHTML = data.matches.map(p => `
        <tr>
          <td>${escapeHtml(p.name)}</td>
          <td>${escapeHtml(p.category)}</td>
          <td>CHF ${p.price_chf.toFixed(2)}</td>
        </tr>
      `).join("");
    } catch {
      matchBody.innerHTML = `<tr><td colspan="3" class="error-msg">Failed to load matches.</td></tr>`;
    }
  }

  function formatDate(iso) {
    if (!iso) return "—";
    const d = new Date(iso + "Z"); // treat as UTC
    return d.toLocaleDateString("en-CH", { day: "2-digit", month: "short", year: "numeric" });
  }

  document.getElementById("filter-category").addEventListener("change", renderTable);
  document.getElementById("filter-priority").addEventListener("change", renderTable);
  document.getElementById("refresh-btn").addEventListener("click", loadRequests);

  loadRequests();
</script>
</body>
</html>
